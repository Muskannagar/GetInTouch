<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style/contact.css">
</head>

<body>
    <form action="">
        <div class="pura">
            <h1>Get In Touch</h1>
            <p >Name: <input type="text" name="name" placeholder="Full Name"></p>
            <p >Email Address <input type="email" name="email" id="email" placeholder="muskan@gmail.com"></p>
            <p >Phone <input type="number" name="phone" id="phone"placeholder="1223435678"></p>
            <p >Address <input type="address" name="add" id="address" placeholder="your address"></p>
            <p >Message <input type="text" name="msg" placeholder="Type your msg here"></p>
            <input class="sub" type="submit" value="submit">
            <p class="end">Thanks for contacting us</p>
        </div>
    </form>
</body>
</html>
